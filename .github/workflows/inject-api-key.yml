name: Inject API Key into Meal Planner

on:
  push:
    paths:
      - 'meal-planner/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Gemini API Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret is not set. Skipping."
            exit 0
          fi
          sed -i "s|__GEMINI_API_KEY__|${GEMINI_API_KEY}|g" meal-planner/index.html
          echo "API key injected."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meal-planner/index.html
          git diff --staged --quiet || git commit -m "Inject API key into meal-planner"
          git push
